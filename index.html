<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>앙스타 유닛별 최애캐 고르기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Black+Han+Sans&family=Gaegu:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #e8ecf4;
    color: #222;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    padding: 32px 0 8px;
    font-size: 30px;
    font-family: 'Gaegu', cursive;
    font-weight: 700;
    letter-spacing: 2px;
  }

  .subtitle {
    text-align: center;
    color: #777;
    font-size: 14px;
    margin-bottom: 24px;
  }

  .actions {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .actions button {
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s;
  }

  .actions button:active { transform: scale(0.95); }

  .btn-save {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
  }

  .btn-share {
    background: linear-gradient(135deg, #f093fb, #f5576c);
    color: #fff;
  }

  .btn-reset {
    background: #ccc;
    color: #555;
  }

  #app {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 16px 40px;
  }

  .agency-section {
    margin-bottom: 24px;
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .agency-header {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    gap: 14px;
  }

  .agency-header img {
    height: 40px;
    object-fit: contain;
    filter: brightness(1.1);
  }

  .agency-header span {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .units-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    padding: 1px;
  }

  .unit-card {
    background: #f0f2f8;
    border-radius: 8px;
    padding: 6px 2px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    min-height: 130px;
    position: relative;
    overflow: hidden;
  }

  .unit-card:hover {
    background: #e0e4f0;
    transform: translateY(-2px);
  }

  .unit-card.selected {
    background: #f0f2f8;
  }

  .unit-logo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    height: 50px;
    max-width: 80%;
    object-fit: contain;
    opacity: 0.15;
    pointer-events: none;
  }

  .unit-card:not(.selected) .unit-logo {
    opacity: 0.35;
  }

  .unit-chibi {
    height: 90px;
    max-width: 70px;
    object-fit: contain;
    transition: transform 0.2s;
    position: relative;
    z-index: 1;
  }

  .unit-chibi:hover {
    transform: scale(1.1);
  }

  .unit-placeholder {
    color: #999;
    font-size: 12px;
    position: relative;
    z-index: 1;
  }

  .char-name {
    font-size: 11px;
    color: #666;
    margin-top: 4px;
    position: relative;
    z-index: 1;
    text-align: center;
  }

  /* 팝업 */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    max-width: 480px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }

  .modal-title {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .modal-title img {
    height: 32px;
    object-fit: contain;
  }

  .modal-title span {
    font-size: 18px;
    font-weight: 700;
  }

  .modal-chars {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 12px;
  }

  .modal-char {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 8px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    background: #f0f2f8;
  }

  .modal-char:hover {
    background: #dde0f0;
    transform: scale(1.05);
  }

  .modal-char img {
    height: 72px;
    object-fit: contain;
    margin-bottom: 6px;
  }

  .modal-char span {
    font-size: 11px;
    color: #555;
    text-align: center;
  }

  .modal-close {
    display: block;
    margin: 16px auto 0;
    padding: 8px 32px;
    border: none;
    border-radius: 8px;
    background: #e0e0e0;
    color: #666;
    font-size: 14px;
    cursor: pointer;
  }

  /* 결과 캡처용 */
  #capture-area {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 16px;
  }

  /* toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #444;
    color: #fff;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    z-index: 200;
    transition: transform 0.3s;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 600px) {
    .units-grid {
      grid-template-columns: repeat(4, 1fr);
    }
    .modal-chars {
      grid-template-columns: repeat(3, 1fr);
    }
  }
</style>

<div style="text-align:right;padding:8px 20px 0;">
  <select id="lang-select" onchange="changeLang(this.value)" style="padding:4px 8px;border-radius:6px;border:1px solid #ccc;font-size:13px;cursor:pointer;">

    <option value="ja">🇯🇵 日本語</option>
    <option value="en">🇺🇸 English</option>
  </select>
</div>

<div style="text-align:center;padding:8px 20px 0;">
  <input id="nickname" type="text" placeholder="" oninput="updateTitle()" maxlength="8" style="padding:6px 12px;border-radius:8px;border:1px solid #ccc;font-size:14px;font-family:'Gaegu',cursive;text-align:center;width:180px;">

<div id="capture-area">

  <div id="app"></div>
</div>

<div class="actions">
  <button class="btn-save" onclick="saveAsImage()" id="btn-save">이미지 저장</button>
  <button class="btn-share" onclick="shareLink()" id="btn-share">링크 공유</button>
  <button class="btn-reset" onclick="resetAll()" id="btn-reset">초기화</button>
</div>

<div style="text-align:center;padding:12px 0 20px;">
  <a href="https://chillingdaisydev.github.io/enstars-unit-bias-chart/" style="color:#aaa;font-size:11px;text-decoration:none;">chillingdaisydev.github.io/enstars-unit-bias-chart</a>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">

    </div>

    <button class="modal-close" onclick="closeModal()">닫기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

let currentLang = 'ko';
let selections = {};

function t(key) { return I18N[currentLang][key] || key; }
function tName(id) { return I18N[currentLang].names[id] || id; }

function getTitle() {
  const nick = document.getElementById('nickname').value.trim();
  return nick ? I18N[currentLang].titleWithName(nick) : I18N[currentLang].titleNoName;
}

function updateTitle() {
  document.getElementById('main-title').innerHTML = getTitle();
}

function changeLang(lang) {
  currentLang = lang;
  document.getElementById('nickname').placeholder = t('nickPlaceholder');
  updateTitle();
  document.getElementById('subtitle').textContent = t('subtitle');
  document.getElementById('btn-save').textContent = t('save');
  document.getElementById('btn-share').textContent = t('share');
  document.getElementById('btn-reset').textContent = t('reset');
  document.querySelector('.modal-close').textContent = t('close');
  const params = new URLSearchParams(window.location.search);
  params.set('lang', lang);
  history.replaceState(null, '', window.location.pathname + '?' + params.toString());
  render();
}

function detectLang() {
  const browserLang = (navigator.language || navigator.userLanguage || 'ko').toLowerCase();
  if (browserLang.startsWith('ja')) return 'ja';
  if (browserLang.startsWith('en')) return 'en';
  return 'ko';
}

function init() {
  const params = new URLSearchParams(window.location.search);
  if (params.has('lang')) {
    currentLang = params.get('lang');
  } else {
    currentLang = detectLang();
  }
  document.getElementById('lang-select').value = currentLang;
  loadFromURL();
  changeLang(currentLang);
  render();
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  DATA.agencies.forEach(agency => {
    const section = document.createElement('div');
    section.className = 'agency-section';

    const header = document.createElement('div');
    header.className = 'agency-header';
    header.style.background = agency.color;
    header.innerHTML = (agency.logo ? `<img src="${agency.logo}" alt="${agency.name}">` : '') + `<span>${agency.name === 'OTHERS' ? (currentLang === 'ja' ? 'その他' : currentLang === 'en' ? 'OTHERS' : '기타') : agency.name}</span>`;
    section.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'units-grid';

    agency.units.forEach(unit => {
      const card = document.createElement('div');
      card.className = 'unit-card' + (selections[unit.id] ? ' selected' : '');
      card.onclick = () => openModal(unit);

      const logoScale = (unit.id === 'valkyrie' || unit.id === 'alkaloid') ? 'height:35px;max-width:60%;' : (unit.id === 'undead' || unit.id === 'rabits') ? 'height:38px;max-width:65%;' : '';
      let content = unit.logo ? `<img class="unit-logo" src="${unit.logo}" alt="${unit.name}" style="${logoScale}">` : '';

      if (selections[unit.id]) {
        const member = unit.members.find(m => m.id === selections[unit.id]);
        if (member) {
          content += `<img class="unit-chibi" src="${member.img}" alt="${tName(member.id)}">`;
          content += `<div class="char-name">${tName(member.id)}</div>`;
        }
      }

      card.innerHTML = content;
      grid.appendChild(card);
    });

    // Fill remaining cells to maintain 4-column layout
    const remainder = agency.units.length % 4;
    if (remainder > 0) {
      for (let i = 0; i < 4 - remainder; i++) {
        const empty = document.createElement('div');
        grid.appendChild(empty);
      }
    }

    section.appendChild(grid);
    app.appendChild(section);
  });
}

function openModal(unit) {
  const modal = document.getElementById('modal');
  const modalLogo = document.getElementById('modal-logo');
  if (unit.logo) { modalLogo.src = unit.logo; modalLogo.style.display = ''; }
  else { modalLogo.style.display = 'none'; }
  document.getElementById('modal-unit-name').textContent = unit.id === 'others' ? (currentLang === 'ja' ? 'その他' : currentLang === 'en' ? 'Others' : '기타') : unit.name;

  const charsEl = document.getElementById('modal-chars');
  charsEl.innerHTML = '';

  // 선택 안함 옵션
  const noneEl = document.createElement('div');
  noneEl.className = 'modal-char';
  noneEl.style.background = '#3a2a2a';
  noneEl.innerHTML = `<div style="height:72px;display:flex;align-items:center;justify-content:center;font-size:28px;color:#888;">-</div><span style="color:#f88;">${t('noSelect')}</span>`;
  noneEl.onclick = () => {
    delete selections[unit.id];
    updateURL();
    render();
    modal.classList.remove('active');
  };
  charsEl.appendChild(noneEl);

  unit.members.forEach(member => {
    const el = document.createElement('div');
    el.className = 'modal-char';
    el.innerHTML = `<img src="${member.img}" alt="${tName(member.id)}"><span>${tName(member.id)}</span>`;
    el.onclick = () => {
      selections[unit.id] = member.id;
      updateURL();
      render();
      modal.classList.remove('active');
    };
    charsEl.appendChild(el);
  });

  modal.classList.add('active');
}

function closeModal(e) {
  if (!e || e.target === e.currentTarget) {
    document.getElementById('modal').classList.remove('active');
  }
}

function updateURL() {
  const params = new URLSearchParams();
  Object.entries(selections).forEach(([unit, member]) => {
    params.set(unit, member);
  });
  const newURL = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
  history.replaceState(null, '', newURL);
}

function loadFromURL() {
  const params = new URLSearchParams(window.location.search);
  params.forEach((member, unit) => {
    selections[unit] = member;
  });
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function saveAsImage() {
  // 캡처 전용 영역을 고정 너비로 생성
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;left:-9999px;top:0;width:600px;box-sizing:border-box;background:#fff;padding:4px 16px 0;font-family:"Noto Sans KR",sans-serif;overflow:hidden;';

  const title = document.createElement('h1');
  title.innerHTML = getTitle();
  title.style.cssText = 'text-align:center;font-size:30px;font-family:"Gaegu",cursive;font-weight:700;color:#222;margin:4px 0 8px;letter-spacing:4px;';
  container.appendChild(title);

  DATA.agencies.forEach(agency => {
    const section = document.createElement('div');
    section.style.cssText = 'margin-bottom:16px;border-radius:8px;overflow:hidden;background:#fff;';

    const header = document.createElement('div');
    header.style.cssText = `display:flex;align-items:center;padding:4px 16px;gap:10px;background:${agency.color};`;
    header.innerHTML = (agency.logo ? `<img src="${agency.logo}" style="height:28px;object-fit:contain;">` : '') + `<span style="font-size:14px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#fff;">${agency.name === 'OTHERS' ? (currentLang === 'ja' ? 'その他' : currentLang === 'en' ? 'OTHERS' : '기타') : agency.name}</span>`;
    section.appendChild(header);

    const grid = document.createElement('div');
    grid.style.cssText = 'display:grid;grid-template-columns:repeat(4,1fr);gap:0;padding:0;';

    agency.units.forEach(unit => {
      const card = document.createElement('div');
      card.style.cssText = 'background:#fff;padding:2px 0 4px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;position:relative;overflow:visible;';

      const hasSel = !!selections[unit.id];

      if (hasSel) {
        const member = unit.members.find(m => m.id === selections[unit.id]);
        if (member) {
          const chibi = document.createElement('img');
          chibi.src = member.img;
          chibi.style.cssText = 'height:190px;width:auto;object-fit:contain;position:relative;z-index:2;';
          card.appendChild(chibi);
        }
      }

      // 유닛 로고를 좌하단에 작게 (캐릭터 뒤에)
      if (unit.logo) {
        const logo = document.createElement('img');
        logo.src = unit.logo;
        logo.style.cssText = `position:absolute;bottom:2px;left:2px;height:32px;width:auto;max-width:72px;object-fit:contain;opacity:${hasSel ? '0.5' : '0.35'};pointer-events:none;z-index:1;`;
        card.appendChild(logo);
      }

      grid.appendChild(card);
    });

    // Fill empty cells for 4-column alignment
    const remainder = agency.units.length % 4;
    if (remainder > 0) {
      for (let i = 0; i < 4 - remainder; i++) {
        const empty = document.createElement('div');
        grid.appendChild(empty);
      }
    }

    section.appendChild(grid);
    container.appendChild(section);
  });

  const footer = document.createElement('div');
  footer.textContent = 'chillingdaisydev.github.io/enstars-unit-bias-chart';
  footer.style.cssText = 'text-align:center;font-size:12px;color:#bbb;margin-top:20px;';
  container.appendChild(footer);

  document.body.appendChild(container);

  const actualW = container.offsetWidth;
  const actualH = container.offsetHeight;
  html2canvas(container, {
    backgroundColor: '#fff',
    scale: 2,
    useCORS: true,
    width: actualW,
    height: actualH,
    windowWidth: actualW,
  }).then(canvas => {
    document.body.removeChild(container);
    const link = document.createElement('a');
    link.download = 'enstar_favorites.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast(t('toastSaved'));
  }).catch(() => {
    document.body.removeChild(container);
  });
}

function shareLink() {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => {
    showToast(t('toastLink'));
  }).catch(() => {
    prompt('링크를 복사하세요:', url);
  });
}

function resetAll() {
  selections = {};
  updateURL();
  render();
  showToast(t('toastReset'));
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

init();
</script>
