<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>앙스타 유닛별 최애캐 고르기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #e8ecf4;
    color: #222;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    padding: 32px 0 8px;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 2px;
  }

  .subtitle {
    text-align: center;
    color: #777;
    font-size: 14px;
    margin-bottom: 24px;
  }

  .actions {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .actions button {
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s;
  }

  .actions button:active { transform: scale(0.95); }

  .btn-save {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
  }

  .btn-share {
    background: linear-gradient(135deg, #f093fb, #f5576c);
    color: #fff;
  }

  .btn-reset {
    background: #ccc;
    color: #555;
  }

  #app {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 16px 40px;
  }

  .agency-section {
    margin-bottom: 24px;
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .agency-header {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    gap: 14px;
  }

  .agency-header img {
    height: 40px;
    object-fit: contain;
    filter: brightness(1.1);
  }

  .agency-header span {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .units-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1px;
    padding: 1px;
  }

  .unit-card {
    background: #f0f2f8;
    border-radius: 8px;
    padding: 6px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    min-height: 130px;
    position: relative;
    overflow: hidden;
  }

  .unit-card:hover {
    background: #e0e4f0;
    transform: translateY(-2px);
  }

  .unit-card.selected {
    background: #f0f2f8;
  }

  .unit-logo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    height: 50px;
    max-width: 80%;
    object-fit: contain;
    opacity: 0.15;
    pointer-events: none;
  }

  .unit-card:not(.selected) .unit-logo {
    opacity: 0.35;
  }

  .unit-chibi {
    height: 90px;
    object-fit: contain;
    transition: transform 0.2s;
    position: relative;
    z-index: 1;
  }

  .unit-chibi:hover {
    transform: scale(1.1);
  }

  .unit-placeholder {
    color: #999;
    font-size: 12px;
    position: relative;
    z-index: 1;
  }

  .char-name {
    font-size: 11px;
    color: #666;
    margin-top: 4px;
    position: relative;
    z-index: 1;
    text-align: center;
  }

  /* 팝업 */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    max-width: 480px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }

  .modal-title {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .modal-title img {
    height: 32px;
    object-fit: contain;
  }

  .modal-title span {
    font-size: 18px;
    font-weight: 700;
  }

  .modal-chars {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 12px;
  }

  .modal-char {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 8px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    background: #f0f2f8;
  }

  .modal-char:hover {
    background: #dde0f0;
    transform: scale(1.05);
  }

  .modal-char img {
    height: 72px;
    object-fit: contain;
    margin-bottom: 6px;
  }

  .modal-char span {
    font-size: 11px;
    color: #555;
    text-align: center;
  }

  .modal-close {
    display: block;
    margin: 16px auto 0;
    padding: 8px 32px;
    border: none;
    border-radius: 8px;
    background: #e0e0e0;
    color: #666;
    font-size: 14px;
    cursor: pointer;
  }

  /* 결과 캡처용 */
  #capture-area {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 16px;
  }

  /* toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #444;
    color: #fff;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    z-index: 200;
    transition: transform 0.3s;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 600px) {
    .units-grid {
      grid-template-columns: repeat(2, 1fr);
    }
    .modal-chars {
      grid-template-columns: repeat(3, 1fr);
    }
  }
</style>

<div id="capture-area">

  <p class="subtitle">각 유닛을 클릭해서 최애캐를 골라보세요!</p>
  <div id="app"></div>
</div>

<div class="actions">
  <button class="btn-save" onclick="saveAsImage()">이미지 저장</button>
  <button class="btn-share" onclick="shareLink()">링크 공유</button>
  <button class="btn-reset" onclick="resetAll()">초기화</button>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">
      <img id="modal-logo" src="" alt="">
      <span id="modal-unit-name"></span>
    </div>
    <div class="modal-chars" id="modal-chars"></div>
    <button class="modal-close" onclick="closeModal()">닫기</button>
  </div>

<div class="toast" id="toast"></div>

let selections = {};

function init() {
  loadFromURL();
  render();
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  DATA.agencies.forEach(agency => {
    const section = document.createElement('div');
    section.className = 'agency-section';

    const header = document.createElement('div');
    header.className = 'agency-header';
    header.style.background = agency.color;
    header.innerHTML = `<img src="${agency.logo}" alt="${agency.name}"><span>${agency.name}</span>`;
    section.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'units-grid';

    agency.units.forEach(unit => {
      const card = document.createElement('div');
      card.className = 'unit-card' + (selections[unit.id] ? ' selected' : '');
      card.onclick = () => openModal(unit);

      let content = `<img class="unit-logo" src="${unit.logo}" alt="${unit.name}">`;

      if (selections[unit.id]) {
        const member = unit.members.find(m => m.id === selections[unit.id]);
        if (member) {
          content += `<img class="unit-chibi" src="${member.img}" alt="${member.name}">`;
          content += `<div class="char-name">${member.name}</div>`;
        }
      }

      card.innerHTML = content;
      grid.appendChild(card);
    });

    section.appendChild(grid);
    app.appendChild(section);
  });
}

function openModal(unit) {
  const modal = document.getElementById('modal');
  document.getElementById('modal-logo').src = unit.logo;
  document.getElementById('modal-unit-name').textContent = unit.name;

  const charsEl = document.getElementById('modal-chars');
  charsEl.innerHTML = '';

  // 선택 안함 옵션
  const noneEl = document.createElement('div');
  noneEl.className = 'modal-char';
  noneEl.style.background = '#3a2a2a';
  noneEl.innerHTML = `<div style="height:72px;display:flex;align-items:center;justify-content:center;font-size:28px;color:#888;">-</div><span style="color:#f88;">선택 안함</span>`;
  noneEl.onclick = () => {
    delete selections[unit.id];
    updateURL();
    render();
    modal.classList.remove('active');
  };
  charsEl.appendChild(noneEl);

  unit.members.forEach(member => {
    const el = document.createElement('div');
    el.className = 'modal-char';
    el.innerHTML = `<img src="${member.img}" alt="${member.name}"><span>${member.name}</span>`;
    el.onclick = () => {
      selections[unit.id] = member.id;
      updateURL();
      render();
      modal.classList.remove('active');
    };
    charsEl.appendChild(el);
  });

  modal.classList.add('active');
}

function closeModal(e) {
  if (!e || e.target === e.currentTarget) {
    document.getElementById('modal').classList.remove('active');
  }
}

function updateURL() {
  const params = new URLSearchParams();
  Object.entries(selections).forEach(([unit, member]) => {
    params.set(unit, member);
  });
  const newURL = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
  history.replaceState(null, '', newURL);
}

function loadFromURL() {
  const params = new URLSearchParams(window.location.search);
  params.forEach((member, unit) => {
    selections[unit] = member;
  });
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function saveAsImage() {
  // 캡처 전용 영역을 고정 너비로 생성
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;left:-9999px;top:0;width:400px;box-sizing:border-box;background:#e8ecf4;padding:10px 2px 14px;font-family:"Noto Sans KR",sans-serif;overflow:hidden;';

  const title = document.createElement('h1');
  title.textContent = '앙스타 유닛별 최애캐';
  title.style.cssText = 'text-align:center;font-size:18px;font-weight:900;color:#222;margin:0 0 8px;letter-spacing:2px;';
  container.appendChild(title);

  DATA.agencies.forEach(agency => {
    const section = document.createElement('div');
    section.style.cssText = 'margin-bottom:4px;border-radius:6px;overflow:hidden;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.06);';

    const header = document.createElement('div');
    header.style.cssText = `display:flex;align-items:center;padding:4px 10px;gap:8px;background:${agency.color};`;
    header.innerHTML = `<img src="${agency.logo}" style="height:20px;object-fit:contain;"><span style="font-size:10px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:#fff;">${agency.name}</span>`;
    section.appendChild(header);

    const grid = document.createElement('div');
    grid.style.cssText = 'display:grid;grid-template-columns:repeat(4,1fr);gap:0;padding:0;';

    agency.units.forEach(unit => {
      const card = document.createElement('div');
      card.style.cssText = 'background:#f0f2f8;padding:2px 0 3px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70px;position:relative;overflow:hidden;';

      const logo = document.createElement('img');
      logo.src = unit.logo;
      const hasSel = !!selections[unit.id];
      logo.style.cssText = `position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);height:30px;max-width:80%;object-fit:contain;opacity:${hasSel ? '0.12' : '0.3'};pointer-events:none;`;
      card.appendChild(logo);

      if (hasSel) {
        const member = unit.members.find(m => m.id === selections[unit.id]);
        if (member) {
          const chibi = document.createElement('img');
          chibi.src = member.img;
          chibi.style.cssText = 'height:62px;object-fit:contain;position:relative;z-index:1;';
          card.appendChild(chibi);
          const name = document.createElement('div');
          name.textContent = member.name;
          name.style.cssText = 'font-size:8px;color:#666;margin-top:1px;position:relative;z-index:1;text-align:center;';
          card.appendChild(name);
        }
      }

      grid.appendChild(card);
    });

    section.appendChild(grid);
    container.appendChild(section);
  });

  document.body.appendChild(container);

  const actualW = container.offsetWidth;
  const actualH = container.offsetHeight;
  html2canvas(container, {
    backgroundColor: '#e8ecf4',
    scale: 2,
    useCORS: true,
    width: actualW,
    height: actualH,
    windowWidth: actualW,
  }).then(canvas => {
    document.body.removeChild(container);
    const link = document.createElement('a');
    link.download = 'enstar_favorites.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('이미지가 저장되었습니다!');
  }).catch(() => {
    document.body.removeChild(container);
  });
}

function shareLink() {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => {
    showToast('링크가 복사되었습니다!');
  }).catch(() => {
    prompt('링크를 복사하세요:', url);
  });
}

function resetAll() {
  selections = {};
  updateURL();
  render();
  showToast('초기화되었습니다');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

init();
</script>
</body>
</html>
